services:
  tamias:
    build: .
    image: tamias:local
    container_name: tamias
    restart: unless-stopped
    environment:
      PORT: ${PORT:-5180}
      HOST: 0.0.0.0
    # Map only the chosen port, not the whole image's exposed range.
    ports:
      - '${PORT:-5180}:${PORT:-5180}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:${PORT:-5180}/']
      interval: 30s
      timeout: 5s
      retries: 3
