name: Validate updater secrets

# Manually-triggered self-test that proves both updater secrets are wired
# correctly WITHOUT cutting a release.
#
# Tauri 2 ships keys in two interchangeable formats:
#   - "wrapped":  the entire minisign file base64-encoded into a single line
#                 (this is what `tauri signer generate` writes to disk and
#                 what `tauri-action` expects in TAURI_SIGNING_PRIVATE_KEY)
#   - "unwrapped": the raw minisign file with the "untrusted comment:" header
#                 line and the base64 key body on separate lines
#
# This workflow detects which one the user pasted into the secret, validates
# it can be decoded, and signs a dummy payload using the same flag the real
# tauri-action uses so a green run guarantees the release will sign.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diagnose private-key + password secrets
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "${KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty or unset"
            exit 1
          fi

          # Detect format. Wrapped = single base64 line; unwrapped = starts
          # with "untrusted comment:" on the first line.
          umask 077
          printf '%s' "${KEY}" | tr -d '\r' > "${RUNNER_TEMP}/key.raw"
          # If the secret is wrapped, base64-decoding it should produce a
          # minisign file beginning with "untrusted comment:".
          DECODED_HEAD=$(base64 -d < "${RUNNER_TEMP}/key.raw" 2>/dev/null | head -c 18 || true)
          UNWRAPPED_HEAD=$(head -c 18 "${RUNNER_TEMP}/key.raw" || true)

          FORMAT="unknown"
          if [ "${DECODED_HEAD}" = "untrusted comment:" ]; then
            FORMAT="wrapped"
          elif [ "${UNWRAPPED_HEAD}" = "untrusted comment:" ]; then
            FORMAT="unwrapped"
          fi

          BYTES=$(wc -c < "${RUNNER_TEMP}/key.raw" | tr -d ' ')
          LINES=$(grep -c . "${RUNNER_TEMP}/key.raw" || true)
          echo "  bytes:                ${BYTES}"
          echo "  non-empty lines:      ${LINES}"
          echo "  detected format:      ${FORMAT}"

          if [ "${FORMAT}" = "unknown" ]; then
            echo "::error::Could not parse TAURI_SIGNING_PRIVATE_KEY as either wrapped (base64) or unwrapped (raw minisign) format."
            echo "         Re-paste the contents of tauri-signing.key from disk."
            exit 1
          fi

          if [ "${FORMAT}" = "unwrapped" ]; then
            # Wrap it for the signer call below (it expects the wrapped form).
            base64 < "${RUNNER_TEMP}/key.raw" | tr -d '\n' > "${RUNNER_TEMP}/key.wrapped"
            echo "  (re-wrapped from raw minisign to base64 form for signing test)"
          else
            cp "${RUNNER_TEMP}/key.raw" "${RUNNER_TEMP}/key.wrapped"
          fi

          if [ -z "${PW:-}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty (key is unencrypted)"
          else
            CR=$(printf '%s' "${PW}" | tr -cd '\r' | wc -c | tr -d ' ')
            LF=$(printf '%s' "${PW}" | tr -cd '\n' | wc -c | tr -d ' ')
            echo "  password length:      ${#PW}"
            echo "  password contains CR: ${CR}"
            echo "  password contains LF: ${LF}"
            if [ "$CR" -gt 0 ] || [ "$LF" -gt 0 ]; then
              echo "::warning::Password contains line-break characters — likely a paste artefact."
            fi
          fi

      - name: Sign a dummy payload using --private-key (the way tauri-action does)
        env:
          PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          echo "TAMIAS validation $(date -u +%FT%TZ)" > "${RUNNER_TEMP}/payload.txt"
          KEY_VAL="$(cat "${RUNNER_TEMP}/key.wrapped")"
          # NB: we pass the wrapped key as --private-key, NOT via env var, so
          # there's no conflict with --private-key-path.
          npx --yes @tauri-apps/cli@2 signer sign \
            --private-key "${KEY_VAL}" \
            --password "${PW}" \
            "${RUNNER_TEMP}/payload.txt"
          if [ ! -s "${RUNNER_TEMP}/payload.txt.sig" ]; then
            echo "::error::Signing produced no .sig file"
            exit 1
          fi
          echo "✓ Signature OK ($(wc -c < "${RUNNER_TEMP}/payload.txt.sig" | tr -d ' ') bytes)"

      - name: Cross-check that the embedded public key isn't the placeholder
        run: |
          set -e
          PUBKEY=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).plugins.updater.pubkey)")
          if [ -z "${PUBKEY}" ] || [ "${PUBKEY}" = "REPLACE_WITH_TAURI_SIGNER_PUBLIC_KEY" ]; then
            echo "::error::src-tauri/tauri.conf.json plugins.updater.pubkey is missing or still the placeholder."
            echo "         Run: node scripts/init-updater.mjs (and commit the updated conf)"
            exit 1
          fi
          echo "✓ public key embedded (${#PUBKEY} chars)"
          echo ""
          echo "All checks passed — the desktop release workflow will accept these secrets."
