name: Validate updater secrets

# Manually-triggered self-test that proves both updater secrets are wired
# correctly WITHOUT cutting a release.
#
# Diagnostics first: prints structural info about the private-key secret
# (length, line count, comment present, no internal whitespace inside the
# base64 portion) so we can attribute paste corruption without ever
# exposing the secret value itself.
#
# Then signs a dummy payload with the secret + password to prove they
# decrypt and produce a valid signature.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Diagnose the private-key secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty or unset"
            exit 1
          fi

          # Write to a tmp file for inspection. We mask the actual secret in
          # the logs by only printing structural facts.
          umask 077
          printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY}" > "${RUNNER_TEMP}/raw.key"

          # Strip CRLF -> LF defensively (a common Windows clipboard issue).
          tr -d '\r' < "${RUNNER_TEMP}/raw.key" > "${RUNNER_TEMP}/key.lf"

          BYTES=$(wc -c < "${RUNNER_TEMP}/key.lf" | tr -d ' ')
          LINES=$(wc -l < "${RUNNER_TEMP}/key.lf" | tr -d ' ')
          NON_EMPTY=$(grep -cv '^$' "${RUNNER_TEMP}/key.lf" || true)
          FIRST_LINE_LEN=$(head -n1 "${RUNNER_TEMP}/key.lf" | wc -c | tr -d ' ')
          STARTS_WITH_COMMENT="no"
          head -n1 "${RUNNER_TEMP}/key.lf" | grep -q '^untrusted comment' && STARTS_WITH_COMMENT="yes"

          echo "  bytes:                 ${BYTES}"
          echo "  total lines:           ${LINES}"
          echo "  non-empty lines:       ${NON_EMPTY}"
          echo "  first line length:     ${FIRST_LINE_LEN}"
          echo "  starts with 'untrusted comment': ${STARTS_WITH_COMMENT}"

          if [ "$STARTS_WITH_COMMENT" != "yes" ]; then
            echo "::error::Secret does not start with 'untrusted comment:'."
            echo "         The secret should be the FULL contents of tauri-signing.key,"
            echo "         starting with the 'untrusted comment: rsign encrypted secret key' line."
            exit 1
          fi

          # The minisign secret-key format is exactly:
          #   line 1: untrusted comment: ...
          #   line 2: <single-line base64-encoded encrypted key>
          # If the data line was split across multiple lines by a paste,
          # we attempt to repair by joining all non-comment lines.
          DATA_LINES=$(grep -cv '^untrusted comment\|^$' "${RUNNER_TEMP}/key.lf" || true)
          echo "  data lines (after comment): ${DATA_LINES}"
          if [ "$DATA_LINES" -gt 1 ]; then
            echo "::warning::Detected ${DATA_LINES} non-comment lines. Re-joining into a single line as a repair attempt."
            head -n1 "${RUNNER_TEMP}/key.lf" > "${RUNNER_TEMP}/repaired.key"
            grep -v '^untrusted comment\|^$' "${RUNNER_TEMP}/key.lf" | tr -d '\n' >> "${RUNNER_TEMP}/repaired.key"
            printf '\n' >> "${RUNNER_TEMP}/repaired.key"
            cp "${RUNNER_TEMP}/repaired.key" "${RUNNER_TEMP}/key.final"
          else
            cp "${RUNNER_TEMP}/key.lf" "${RUNNER_TEMP}/key.final"
          fi
          echo "  final byte count:      $(wc -c < "${RUNNER_TEMP}/key.final" | tr -d ' ')"

      - name: Diagnose the password secret
        env:
          PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${PW:-}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty (the key is treated as unencrypted)"
          else
            # Print only structural facts — never the value.
            CR_COUNT=$(printf '%s' "${PW}" | tr -cd '\r' | wc -c | tr -d ' ')
            LF_COUNT=$(printf '%s' "${PW}" | tr -cd '\n' | wc -c | tr -d ' ')
            echo "  password length: ${#PW}"
            echo "  password contains CR: ${CR_COUNT}"
            echo "  password contains LF: ${LF_COUNT}"
            if [ "$CR_COUNT" -gt 0 ] || [ "$LF_COUNT" -gt 0 ]; then
              echo "::warning::Password contains line-break characters — likely a paste artefact. Consider re-pasting."
            fi
          fi

      - name: Sign a dummy payload using the file path
        id: sign_via_file
        env:
          PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          echo "TAMIAS updater secret-validation $(date -u +%FT%TZ)" > "${RUNNER_TEMP}/payload.txt"
          npx --yes @tauri-apps/cli@2 signer sign \
            --private-key-path "${RUNNER_TEMP}/key.final" \
            --password "${PW}" \
            "${RUNNER_TEMP}/payload.txt"
          if [ ! -s "${RUNNER_TEMP}/payload.txt.sig" ]; then
            echo "::error::Signing produced no .sig file"
            exit 1
          fi
          SIG_BYTES=$(wc -c < "${RUNNER_TEMP}/payload.txt.sig" | tr -d ' ')
          echo "✓ Produced ${SIG_BYTES}-byte signature"

      - name: Cross-check that the embedded public key isn't the placeholder
        run: |
          set -e
          PUBKEY=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).plugins.updater.pubkey)")
          if [ -z "${PUBKEY}" ] || [ "${PUBKEY}" = "REPLACE_WITH_TAURI_SIGNER_PUBLIC_KEY" ]; then
            echo "::error::src-tauri/tauri.conf.json plugins.updater.pubkey is missing or still the placeholder."
            echo "         Run: node scripts/init-updater.mjs (and commit the updated conf)"
            exit 1
          fi
          echo "✓ public key embedded (${#PUBKEY} chars)"
          echo ""
          echo "All checks passed — the desktop release workflow will accept these secrets."
