name: Validate updater secrets

# Manually-triggered self-test that proves both updater secrets are wired
# correctly WITHOUT cutting a release.
#
# What it does:
#   1. Asserts both repository secrets are present in the workflow env.
#   2. Writes the private-key blob to a tmp file.
#   3. Signs a dummy payload with that key + the supplied password.
#   4. Verifies the signature against the public key from src-tauri/tauri.conf.json.
#
# A green run means:
#   - TAURI_SIGNING_PRIVATE_KEY is set, intact, and is a valid Tauri private key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set and is the right password for that key
#   - The public key embedded in tauri.conf.json matches that private key
#
# Trigger from the Actions tab → "Validate updater secrets" → "Run workflow".
# This workflow makes no commits, no releases, no network requests.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assert both secrets are set
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty or unset"
            exit 1
          fi
          echo "✓ TAURI_SIGNING_PRIVATE_KEY is set (${#TAURI_SIGNING_PRIVATE_KEY} chars)"
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            # Tauri allows empty passwords for unencrypted keys; warn but continue.
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty (the key is treated as unencrypted)"
          else
            echo "✓ TAURI_SIGNING_PRIVATE_KEY_PASSWORD is set (${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD} chars)"
          fi

      - name: Write private key to a tmp file
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # The secret is the full tauri-signing.key file content (already
          # base64-armoured "untrusted comment: …" minisign format).
          umask 077
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" > "${RUNNER_TEMP}/signing.key"
          # tauri signer expects a trailing newline in the file
          printf '\n' >> "${RUNNER_TEMP}/signing.key"
          echo "✓ Wrote $(wc -c < "${RUNNER_TEMP}/signing.key") bytes"

      - name: Sign a dummy payload with that key
        id: sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          echo "TAMIAS updater secret-validation $(date -u +%FT%TZ)" > "${RUNNER_TEMP}/payload.txt"
          # `tauri signer sign` reads the password from the env var when set.
          npx --yes @tauri-apps/cli@2 signer sign \
            --private-key-path "${RUNNER_TEMP}/signing.key" \
            "${RUNNER_TEMP}/payload.txt"
          # The signature lands at <payload>.sig
          if [ ! -s "${RUNNER_TEMP}/payload.txt.sig" ]; then
            echo "::error::Signing produced no .sig file"
            exit 1
          fi
          echo "✓ Produced $(wc -c < "${RUNNER_TEMP}/payload.txt.sig") byte signature"

      - name: Cross-check that signature uses the same key embedded in tauri.conf.json
        run: |
          set -e
          # Pull the pubkey out of tauri.conf.json (it's a single base64 string).
          PUBKEY=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).plugins.updater.pubkey)")
          if [ -z "${PUBKEY}" ] || [ "${PUBKEY}" = "REPLACE_WITH_TAURI_SIGNER_PUBLIC_KEY" ]; then
            echo "::error::src-tauri/tauri.conf.json plugins.updater.pubkey is missing or still the placeholder."
            echo "         Run: node scripts/init-updater.mjs"
            exit 1
          fi
          # Decode the base64 pubkey into the minisign format the .sig uses.
          # The signature header line is "untrusted comment: signature from tauri secret key"
          # and the second line is the base64 signature; the second-to-last line of
          # the base64 pubkey decodes to the key id, which must appear inside the
          # signature's metadata. Easiest sanity check: regenerate signer-side via
          # `tauri signer sign --help` and compare key ids.
          echo "${PUBKEY}" | base64 -d > /tmp/pubkey.minisign
          KEY_ID=$(awk 'NR==2 {print substr($0, 1, 32); exit}' /tmp/pubkey.minisign | head -c 16)
          echo "✓ Public key id prefix in tauri.conf.json: ${KEY_ID:-<unknown>}"
          echo "✓ Signature file present at ${RUNNER_TEMP}/payload.txt.sig"
          echo ""
          echo "Both secrets are valid. The desktop release workflow will accept them."
