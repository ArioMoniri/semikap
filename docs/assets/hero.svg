<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="280" viewBox="0 0 1280 280">
  <defs>
    <linearGradient id="bg-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1d3a"/>
      <stop offset="0.5" stop-color="#13284f"/>
      <stop offset="1" stop-color="#0b1d3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="280" fill="url(#bg-hero)"/>
  <rect width="1280" height="280" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.6">
    <path d="M0 80 L1280 80 M0 160 L1280 160 M0 240 L1280 240" stroke="url(#grid)" stroke-width="1"/>
    <path d="M160 0 L160 280 M320 0 L320 280 M480 0 L480 280 M640 0 L640 280 M800 0 L800 280 M960 0 L960 280 M1120 0 L1120 280" stroke="url(#grid)" stroke-width="1"/>
  </g>

  <!-- Logo glyph -->
  <g transform="translate(64 78)">
    <rect x="0" y="0" width="124" height="124" rx="28" fill="#1d4ed8" opacity="0.18"/>
    <rect x="0.5" y="0.5" width="123" height="123" rx="27.5" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
    <path d="M22 42 L102 42 M62 42 L62 100" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="135" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="76" font-weight="800" fill="#ffffff" letter-spacing="0.02em">TAMIAS</text>
  <text x="222" y="170" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="18" fill="#9bb0d8" letter-spacing="0.18em">TRANSPARENT · LOCAL · MEDICAL · IMAGE · ANALYSIS</text>
  <text x="222" y="208" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
