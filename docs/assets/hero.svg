  <!-- Tag pills -->
  <g font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(220 232)">
      <rect width="112" height="26" rx="13" fill="#22c55e" opacity="0.18"/>
      <rect x="0.5" y="0.5" width="111" height="25" rx="12.5" fill="none" stroke="#22c55e" stroke-width="1"/>
      <text x="56" y="17.5" text-anchor="middle" fill="#86efac">NO UPLOAD</text>
    </g>
    <g transform="translate(344 232)">
      <rect width="92" height="26" rx="13" fill="#1d4ed8" opacity="0.22"/>
      <rect x="0.5" y="0.5" width="91" height="25" rx="12.5" fill="none" stroke="#60a5fa" stroke-width="1"/>
      <text x="46" y="17.5" text-anchor="middle" fill="#bfdbfe">WEBGPU</text>
    </g>
    <g transform="translate(448 232)">
      <rect width="84" height="26" rx="13" fill="#a855f7" opacity="0.22"/>
      <rect x="0.5" y="0.5" width="83" height="25" rx="12.5" fill="none" stroke="#c4b5fd" stroke-width="1"/>
      <text x="42" y="17.5" text-anchor="middle" fill="#e9d5ff">ONNX</text>
    </g>
    <g transform="translate(544 232)">
