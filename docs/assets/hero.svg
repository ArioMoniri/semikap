<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1830"/>
      <stop offset="0.55" stop-color="#13284f"/>
      <stop offset="1" stop-color="#0a1830"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.45">
      <stop offset="0" stop-color="#22c8db" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22c8db" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <linearGradient id="logoFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg-hero)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect width="1280" height="320" fill="url(#glow2)"/>

  <!-- Logo card -->
  <g transform="translate(72 80)">
    <rect x="0" y="0" width="160" height="160" rx="36" fill="url(#logoFill)" opacity="0.18"/>
    <rect x="0.75" y="0.75" width="158.5" height="158.5" rx="35.25" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <!-- Stylized T monogram with serif feet for a medical-looking glyph -->
    <path d="M30 50 L130 50 M30 50 L30 62 L72 62 L72 130 L88 130 L88 62 L130 62 L130 50"
          fill="none" stroke="#ffffff" stroke-width="9" stroke-linejoin="round"/>
    <!-- Crosshair pip on the bottom-right of the logo -->
    <g transform="translate(118 122)">
      <circle r="14" fill="#0a1830"/>
      <circle r="14" fill="none" stroke="#22c8db" stroke-width="1.5"/>
      <path d="M-7 0 L7 0 M0 -7 L0 7" stroke="#22c8db" stroke-width="1.5" stroke-linecap="round"/>
      <circle r="2.4" fill="#22c8db"/>
    </g>
  </g>

  <!-- Wordmark + meta -->
  <g transform="translate(264 0)">
    <text x="0" y="138" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
          font-size="92" font-weight="800" fill="#ffffff" letter-spacing="0.005em">TAMIAS</text>
    <text x="6" y="174" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
          font-size="16" fill="#9bb0d8" letter-spacing="0.32em" font-weight="600">TRANSPARENT · LOCAL · MEDICAL · IMAGE · ANALYSIS</text>
    <text x="6" y="212" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
          font-size="20" fill="#dbe7fb" font-weight="500">Browser-only ONNX inference on local DICOM / NIfTI / NRRD.</text>
    <text x="6" y="238" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
          font-size="20" fill="#dbe7fb" font-weight="500">Any GPU vendor via WebGPU. Bytes never leave the device.</text>

    <!-- Pills row -->
    <g transform="translate(6 264)" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
       font-size="12" font-weight="700" letter-spacing="0.08em">
      <g transform="translate(0 0)">
        <rect width="118" height="28" rx="14" fill="#22c55e" fill-opacity="0.16"/>
        <rect x="0.5" y="0.5" width="117" height="27" rx="13.5" fill="none" stroke="#22c55e" stroke-width="1"/>
        <text x="59" y="18.5" text-anchor="middle" fill="#86efac">NO UPLOAD</text>
      </g>
      <g transform="translate(130 0)">
        <rect width="92" height="28" rx="14" fill="#3b82f6" fill-opacity="0.18"/>
        <rect x="0.5" y="0.5" width="91" height="27" rx="13.5" fill="none" stroke="#60a5fa" stroke-width="1"/>
        <text x="46" y="18.5" text-anchor="middle" fill="#bfdbfe">WEBGPU</text>
      </g>
      <g transform="translate(234 0)">
        <rect width="76" height="28" rx="14" fill="#a855f7" fill-opacity="0.18"/>
        <rect x="0.5" y="0.5" width="75" height="27" rx="13.5" fill="none" stroke="#c4b5fd" stroke-width="1"/>
        <text x="38" y="18.5" text-anchor="middle" fill="#e9d5ff">ONNX</text>
      </g>
      <g transform="translate(322 0)">
        <rect width="68" height="28" rx="14" fill="#f59e0b" fill-opacity="0.18"/>
        <rect x="0.5" y="0.5" width="67" height="27" rx="13.5" fill="none" stroke="#fcd34d" stroke-width="1"/>
        <text x="34" y="18.5" text-anchor="middle" fill="#fde68a">PWA</text>
      </g>
      <g transform="translate(402 0)">
        <rect width="92" height="28" rx="14" fill="#22c8db" fill-opacity="0.18"/>
        <rect x="0.5" y="0.5" width="91" height="27" rx="13.5" fill="none" stroke="#67e8f9" stroke-width="1"/>
        <text x="46" y="18.5" text-anchor="middle" fill="#a5f3fc">DESKTOP</text>
      </g>
      <g transform="translate(506 0)">
        <rect width="124" height="28" rx="14" fill="#ec4899" fill-opacity="0.18"/>
        <rect x="0.5" y="0.5" width="123" height="27" rx="13.5" fill="none" stroke="#f9a8d4" stroke-width="1"/>
        <text x="62" y="18.5" text-anchor="middle" fill="#fbcfe8">AUTO-UPDATE</text>
      </g>
    </g>
  </g>
</svg>
