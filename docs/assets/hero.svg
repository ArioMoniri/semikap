      <rect x="0.5" y="0.5" width="99" height="25" rx="12.5" fill="none" stroke="#67e8f9" stroke-width="1"/>
      <text x="50" y="17.5" text-anchor="middle" fill="#a5f3fc">DESKTOP</text>
    </g>
