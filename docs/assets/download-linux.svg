<svg xmlns="http://www.w3.org/2000/svg" width="320" height="84" viewBox="0 0 320 84">
  <defs>
    <linearGradient id="bg-linux" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1d1f"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="320" height="84" rx="14" fill="url(#bg-linux)"/>
  <rect x="0.5" y="0.5" width="319" height="83" rx="13.5" fill="none" stroke="#3a3a3c" stroke-width="1"/>

  <!-- Tux drawn from primitives: head + body + eyes + beak. Recognisable at 48 px tall. -->
  <g transform="translate(20 18)">
    <!-- Body (rounded teardrop) -->
    <path d="M11 22 C11 14 16 9 24 9 C32 9 37 14 37 22 L37 38 C37 44 32 48 24 48 C16 48 11 44 11 38 Z"
          fill="#fff"/>
    <!-- Belly highlight (slightly off-white, gives depth) -->
    <ellipse cx="24" cy="34" rx="8" ry="10" fill="#e5e7eb"/>
    <!-- Head (slightly smaller circle on top) -->
    <circle cx="24" cy="14" r="11" fill="#fff"/>
    <!-- Eye whites -->
    <ellipse cx="20" cy="13" rx="3" ry="4" fill="#fff" stroke="#0b0b0e" stroke-width="0.6"/>
    <ellipse cx="28" cy="13" rx="3" ry="4" fill="#fff" stroke="#0b0b0e" stroke-width="0.6"/>
    <!-- Pupils -->
    <circle cx="20.6" cy="13.6" r="1.4" fill="#0b0b0e"/>
    <circle cx="28.6" cy="13.6" r="1.4" fill="#0b0b0e"/>
    <!-- Beak (subtle, white-on-dark; no neon yellow) -->
    <path d="M20.5 18.5 L24 22 L27.5 18.5 Z" fill="#cbd5e1"/>
    <!-- Feet -->
    <ellipse cx="17" cy="48" rx="4.5" ry="2.4" fill="#cbd5e1"/>
    <ellipse cx="31" cy="48" rx="4.5" ry="2.4" fill="#cbd5e1"/>
  </g>

  <text x="92" y="36" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="12" fill="#a1a1a6" letter-spacing="0.12em">DOWNLOAD FOR</text>
  <text x="92" y="62" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="700" fill="#fff">Linux</text>
</svg>
