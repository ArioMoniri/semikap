<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="rv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1d3a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="rv-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#1d4ed8" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="rv-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 L0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#rv-bg)"/>
  <rect width="1280" height="640" fill="url(#rv-grid)"/>
  <rect width="1280" height="640" fill="url(#rv-glow)"/>

  <!-- Schematic file-tree bubbles -->
  <g opacity="0.85" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#dbeafe">
    <!-- src/ -->
    <circle cx="320" cy="320" r="160" fill="#1d4ed8" fill-opacity="0.18" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="320" y="170" text-anchor="middle" font-size="18" font-weight="700">src/</text>
    <circle cx="240" cy="280" r="48" fill="#22c55e" fill-opacity="0.22" stroke="#22c55e" stroke-width="1"/>
    <text x="240" y="284" text-anchor="middle" font-size="11">components</text>
    <circle cx="380" cy="270" r="40" fill="#a855f7" fill-opacity="0.22" stroke="#a855f7" stroke-width="1"/>
    <text x="380" y="274" text-anchor="middle" font-size="11">workers</text>
    <circle cx="270" cy="380" r="44" fill="#f59e0b" fill-opacity="0.22" stroke="#f59e0b" stroke-width="1"/>
    <text x="270" y="384" text-anchor="middle" font-size="11">lib/inference</text>
    <circle cx="370" cy="370" r="36" fill="#22c8db" fill-opacity="0.22" stroke="#22c8db" stroke-width="1"/>
    <text x="370" y="374" text-anchor="middle" font-size="11">lib/viewer</text>
    <circle cx="320" cy="400" r="28" fill="#ec4899" fill-opacity="0.22" stroke="#ec4899" stroke-width="1"/>
    <text x="320" y="404" text-anchor="middle" font-size="10">lib/fs</text>

    <!-- src-tauri/ -->
    <circle cx="700" cy="240" r="100" fill="#22c8db" fill-opacity="0.18" stroke="#22c8db" stroke-width="1.5"/>
    <text x="700" y="150" text-anchor="middle" font-size="18" font-weight="700">src-tauri/</text>
    <circle cx="660" cy="240" r="32" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.5"/>
    <text x="660" y="244" text-anchor="middle" font-size="11">src</text>
    <circle cx="740" cy="250" r="28" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.5"/>
    <text x="740" y="254" text-anchor="middle" font-size="11">capabilities</text>

    <!-- deploy/ + scripts/ -->
    <circle cx="700" cy="430" r="80" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="700" y="370" text-anchor="middle" font-size="16" font-weight="700">deploy/helm</text>
    <circle cx="900" cy="320" r="70" fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-width="1.5"/>
    <text x="900" y="270" text-anchor="middle" font-size="16" font-weight="700">scripts/</text>
    <text x="900" y="320" text-anchor="middle" font-size="11">install.sh</text>
    <text x="900" y="338" text-anchor="middle" font-size="11">serve.mjs</text>
    <text x="900" y="356" text-anchor="middle" font-size="11">release.mjs</text>

    <!-- docs/ + .github/ -->
    <circle cx="1060" cy="220" r="60" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-width="1.5"/>
    <text x="1060" y="180" text-anchor="middle" font-size="14" font-weight="700">docs/</text>
    <text x="1060" y="220" text-anchor="middle" font-size="11">README · ROADMAP</text>
    <text x="1060" y="238" text-anchor="middle" font-size="11">DEPLOY · UPDATER</text>

    <circle cx="1060" cy="430" r="56" fill="#ec4899" fill-opacity="0.18" stroke="#ec4899" stroke-width="1.5"/>
    <text x="1060" y="400" text-anchor="middle" font-size="14" font-weight="700">.github/</text>
    <text x="1060" y="430" text-anchor="middle" font-size="11">CI · release</text>
    <text x="1060" y="448" text-anchor="middle" font-size="11">repo-viz</text>
  </g>

  <!-- Title + caption -->
  <text x="60" y="64" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" fill="#ffffff">TAMIAS — Repository map</text>
  <text x="60" y="92" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#94a3b8">Schematic placeholder · the live SVG is generated by the Repo visualization workflow on every push to main.</text>

  <text x="640" y="600" text-anchor="middle"
        font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="13" fill="#475569">github.com/ArioMoniri/semikap · regenerated by .github/workflows/repo-visualizer.yml</text>
</svg>
